      /* position in css */

      /* by default position is static  */
      /* static
         relative
         fixed
         absolute
         sticky */

      .box {
        height: 100px;
        width: 100px;
        border: 2px solid red;
        margin: 1%;
        
      }
      .papa{
        display: flex;
        gap: 20px;
        /* flex-direction: row-reverse; */
        border: 2px solid black;
        height: 100vh;
        justify-content: center;
        align-items: center;
      }
      #first {
        position: relative;
        left: 200px;
        top: 100px;
        background-color: black;
      }
      #second {
        position: fixed;
        background-color: aqua;
        bottom: 0;
        right: 0;
      }
      #third {
        width: 100%;
        position: sticky;
        top: 0;
        background-color: green;
      }

      .parent {
        height: 500px;
        width: 100%;
        border: 2px solid black;
        position: relative;
      }
      .child {
