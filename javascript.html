      //what does reduce method do in js?
      // The reduce method in JavaScript is a powerful array method that allows you to reduce an array to a single value by applying a function to each element of the array. It takes a callback function and an optional initial value as arguments.
      //  The callback function is executed for each element in the array, and it receives an accumulator (which holds the accumulated result) and the current element being processed. The result of the callback function is assigned back to the accumulator,
